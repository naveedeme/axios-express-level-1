name: Deploy FullStack Academy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          NODE_ENV: production
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Copy PWA assets into dist
        run: |
          cp public/icon-192.png        dist/icon-192.png
          cp public/icon-512.png        dist/icon-512.png
          cp public/apple-touch-icon.png dist/apple-touch-icon.png
          cp public/favicon.svg         dist/favicon.svg

      - name: Generate manifest.json with correct base path
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          BASE="/${REPO_NAME}/"
          echo "Base path: ${BASE}"

          cat > dist/manifest.json << MANIFEST
          {
            "name": "FullStack Academy — 10-Day Mastery",
            "short_name": "FullStack Academy",
            "description": "Master Express, Axios and React Query in 10 days",
            "start_url": "${BASE}",
            "scope": "${BASE}",
            "display": "standalone",
            "background_color": "#0d1117",
            "theme_color": "#6366f1",
            "orientation": "portrait-primary",
            "categories": ["education", "developer"],
            "icons": [
              {
                "src": "${BASE}icon-192.png",
                "sizes": "192x192",
                "type": "image/png",
                "purpose": "any maskable"
              },
              {
                "src": "${BASE}icon-512.png",
                "sizes": "512x512",
                "type": "image/png",
                "purpose": "any maskable"
              }
            ]
          }
          MANIFEST

      - name: Generate service worker
        run: |
          cat > dist/sw.js << 'SWEOF'
          const CACHE = 'fsa-v2';
          self.addEventListener('install', () => self.skipWaiting());
          self.addEventListener('activate', e => {
            e.waitUntil(
              caches.keys().then(keys =>
                Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
              )
            );
            self.clients.claim();
          });
          self.addEventListener('fetch', e => {
            if (e.request.method !== 'GET') return;
            e.respondWith(
              caches.match(e.request).then(cached => {
                if (cached) return cached;
                return fetch(e.request).then(res => {
                  if (!res || res.status !== 200 || res.type === 'opaque') return res;
                  caches.open(CACHE).then(c => c.put(e.request, res.clone()));
                  return res;
                }).catch(() => caches.match(e.request));
              })
            );
          });
          SWEOF

      - name: List dist contents (debug)
        run: ls -la dist/ && echo "---" && cat dist/manifest.json

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
