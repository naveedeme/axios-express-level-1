name: Deploy FullStack Academy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          NODE_ENV: production
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Copy all PWA static assets into dist
        run: |
          # Icons
          cp public/icon-192.png         dist/icon-192.png
          cp public/icon-512.png         dist/icon-512.png
          cp public/apple-touch-icon.png dist/apple-touch-icon.png
          cp public/favicon.svg          dist/favicon.svg
          # Self-hosted fonts (offline support)
          mkdir -p dist/fonts
          cp public/fonts/*.woff2        dist/fonts/

      - name: Generate manifest.json with correct base path
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          BASE="/${REPO_NAME}/"
          echo "Base: ${BASE}"
          cat > dist/manifest.json << MANIFEST
          {
            "name": "FullStack Academy — 10-Day Mastery",
            "short_name": "FullStack Academy",
            "description": "Master Express, Axios and React Query in 10 days",
            "start_url": "${BASE}",
            "scope": "${BASE}",
            "display": "standalone",
            "background_color": "#0d1117",
            "theme_color": "#6366f1",
            "orientation": "portrait-primary",
            "categories": ["education", "developer"],
            "icons": [
              { "src": "${BASE}icon-192.png", "sizes": "192x192", "type": "image/png", "purpose": "any maskable" },
              { "src": "${BASE}icon-512.png", "sizes": "512x512", "type": "image/png", "purpose": "any maskable" }
            ]
          }
          MANIFEST

      - name: Inject asset filenames + generate final sw.js
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          BASE="/${REPO_NAME}/"

          # Collect all generated asset filenames
          ASSETS=$(ls dist/assets/ | sed "s|^|  './${BASE#/}assets/|" | sed "s|$|',|")
          FONTS=$(ls dist/fonts/  | sed "s|^|  './${BASE#/}fonts/|"  | sed "s|$|',|")

          cat > dist/sw.js << SWEOF
          const VERSION = 'fsa-v3';

          const PRECACHE = [
            '${BASE}',
            '${BASE}index.html',
            '${BASE}manifest.json',
            '${BASE}favicon.svg',
            '${BASE}icon-192.png',
            '${BASE}icon-512.png',
            '${BASE}apple-touch-icon.png',
          ${FONTS}
          ${ASSETS}
          ];

          self.addEventListener('install', e => {
            e.waitUntil(
              caches.open(VERSION)
                .then(c => c.addAll(PRECACHE))
                .then(() => self.skipWaiting())
                .catch(err => { console.error('[SW] precache fail', err); self.skipWaiting(); })
            );
          });

          self.addEventListener('activate', e => {
            e.waitUntil(
              caches.keys()
                .then(keys => Promise.all(keys.filter(k => k !== VERSION).map(k => caches.delete(k))))
                .then(() => self.clients.claim())
            );
          });

          self.addEventListener('fetch', e => {
            if (e.request.method !== 'GET') return;
            const url = new URL(e.request.url);
            const isExternal = url.origin !== self.location.origin;
            if (isExternal) {
              e.respondWith(
                fetch(e.request).catch(() =>
                  new Response(
                    JSON.stringify({ error: 'Offline — API requests need an internet connection.' }),
                    { status: 503, headers: { 'Content-Type': 'application/json' } }
                  )
                )
              );
              return;
            }
            e.respondWith(
              caches.match(e.request).then(cached => {
                if (cached) return cached;
                return fetch(e.request)
                  .then(res => {
                    if (!res || res.status !== 200 || res.type === 'opaque') return res;
                    caches.open(VERSION).then(c => c.put(e.request, res.clone()));
                    return res;
                  })
                  .catch(() => e.request.mode === 'navigate'
                    ? caches.match('${BASE}index.html')
                    : new Response('Offline', { status: 503 })
                  );
              })
            );
          });
          SWEOF
          echo "sw.js generated for base ${BASE}"

      - name: Verify dist contents
        run: |
          echo "=== dist/ ===" && ls -lh dist/ | grep -v assets
          echo "=== dist/fonts/ ===" && ls -lh dist/fonts/
          echo "=== dist/assets/ ===" && ls dist/assets/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
